name: Deploy test file to cPanel

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy header blade only
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          cat > deploy.lftp <<EOF
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set ftp:prefer-epsv true
          set ftp:use-pret false
          set net:timeout 20
          set net:max-retries 1
          open -u "$FTP_USERNAME","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST"
          put resources/views/layouts/header.blade.php -o resources/views/layouts/header.blade.php
          bye
          EOF

          lftp -f deploy.lftp
          EOF

          lftp -d -f deploy.lftp
