---
deployment:
  tasks:
    - export APPROOT=/home/powercut
    - /bin/mkdir -p $APPROOT/lang/en
    - /bin/cp $CPANEL_BASE_DIR/lang/en/kvkk.php $APPROOT/lang/en/kvkk.php
    - /bin/mkdir -p $APPROOT/resources/views/layouts
    - /bin/cp $CPANEL_BASE_DIR/resources/views/layouts/header.blade.php $APPROOT/resources/views/layouts/header.blade.php
    - /bin/rm -rf $APPROOT/storage/framework/views/*.php
